version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: driver_booking_mysql_prod
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: driver
      MYSQL_USER: driver
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-driver}
      MYSQL_INITDB_SKIP_TZINFO: 1
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - driver-booking-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Main Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: driver_booking_app_prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://driver:${MYSQL_PASSWORD:-driver}@mysql:3306/driver"
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      WA_API_URL: ${WA_API_URL}
      WA_API_KEY: ${WA_API_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe@123}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/.backups
    networks:
      - driver-booking-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
    driver: local

networks:
  driver-booking-network:
    driver: bridge
