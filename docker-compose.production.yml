version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: driver_booking_postgres_prod
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-driver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-driver}
      POSTGRES_DB: ${POSTGRES_DB:-driver}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - driver-booking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-driver} -d ${POSTGRES_DB:-driver}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Main Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: driver_booking_app_prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-driver}:${POSTGRES_PASSWORD:-driver}@postgres:5432/${POSTGRES_DB:-driver}?schema=public"
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      WA_API_URL: ${WA_API_URL}
      WA_API_KEY: ${WA_API_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe@123}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/.backups
    networks:
      - driver-booking-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  driver-booking-network:
    driver: bridge
